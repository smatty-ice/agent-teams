# Plugin-local pytest config.
#
# The plugin package directory is ``plugins/agent-teams`` (hyphenated), which is
# not a valid Python dotted name. Once ``__init__.py`` exists, pytest's default
# ``prepend`` import mode walks up the tree, hits the package ``__init__.py``,
# and tries to import it under an invalid module name ("__init__", package=None)
# — which explodes on the relative ``from . import team_tools``.
#
# ``importlib`` import mode imports each test file by file path without the
# parent-package walk, so collection no longer touches the hyphenated package
# name. The package itself is still made importable as ``plugins.agent_teams``
# (underscore) by conftest.py's spec_from_file_location shim, mirroring the live
# Hermes plugin loader. This makes the bare command in the plan work:
#   venv/bin/python -m pytest plugins/agent-teams/tests/ -q
#
# This file is closer to the tests than the repo-root pyproject.toml, so pytest
# selects it as the config (and rootdir) for these tests.
[pytest]
addopts = --import-mode=importlib --timeout=30 --timeout-method=signal
timeout = 30
